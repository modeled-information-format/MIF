name: dast

# Dynamic analysis (OWASP ZAP full scan) against the live MIF spec site. The
# target must be a running URL, so this is opt-in via workflow_dispatch (and a
# scattered weekly schedule), not a PR gate. Mirrors the org's dast.yml.

"on":
  workflow_dispatch:
    inputs:
      target-url:
        description: "Running target URL to scan"
        required: false
        default: "https://mif-spec.dev"
        type: string
  schedule:
    - cron: "23 6 * * 2"

permissions:
  contents: read

jobs:
  dast:
    name: dast
    permissions:
      contents: read
    uses: modeled-information-format/.github/.github/workflows/reusable-zap.yml@ff8adc6b1267c272beef916af851d9506160354f
    with:
      target: ${{ inputs['target-url'] || 'https://mif-spec.dev' }}
      fail-action: false
