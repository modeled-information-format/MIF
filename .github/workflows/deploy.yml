---
name: Deploy to GitHub Pages

# ADR-019: the build vendors the ontology corpus at deploy time by fetching,
# fail-closed attestation-verifying, and untarring the ontologies repo's
# signed release tarball (scripts/vendor-ontologies.py), before the Astro
# build -- Astro copies public/ into dist/ verbatim, so no plugin is needed.
# On any verification failure the script exits non-zero and writes nothing,
# so this job fails before astro build/deploy-pages run and the
# previously-published Pages site stays live (keep-last-good).

"on":
  push:
    branches: [main]
  workflow_dispatch:
  # Fired by ontologies' release.yml after a successful tag-triggered
  # publish (see that repo's notify-mif job), carrying the release ref.
  repository_dispatch:
    types: [ontology-corpus-released]
  # Convergence backstop: re-vendor even if a dispatch was ever missed.
  # Fuzzed, non-round minute per this org's scheduling convention.
  schedule:
    - cron: '37 4 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Mint a token for the cross-repo ontologies read (ci app)
        id: ci-token
        # v3.2.0
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ vars.CI_CLIENT_APP_ID }}
          private-key: ${{ secrets.CI_CLIENT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ontologies

      - name: Vendor the ontology corpus (ADR-019)
        env:
          GH_TOKEN: ${{ steps.ci-token.outputs.token }}
        run: |
          python3 scripts/vendor-ontologies.py "${{ github.event.client_payload.ref }}"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
